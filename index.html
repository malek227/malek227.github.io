<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطوير الأعمال والتقنية</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .post-card {
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }
        .post-card:hover {
            transform: translateY(-5px);
        }
        .post-title {
            color: #222;
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .post-excerpt {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .btn-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مرحباً بك في المنصة المطورة لـ تطوير الأعمال والتقنية</h1>
    <p>تابع أحدث المقالات التقنية وإستراتيجيات تطوير المشاريع المزامنة تلقائياً من المدونة:</p>
    
    <div id="posts-container" class="posts-grid"></div>
</div>

<script>
    // وظيفة معالجة البيانات القادمة من بلوجر وفك تشفيرها وعرضها كبطاقات احترافية
    function myBloggerFeed(data) {
        const container = document.getElementById('posts-container');
        const entries = data.feed.entry;
        
        if (!entries || entries.length === 0) {
            container.innerHTML = '<p>لا توجد منشورات متوفرة حالياً.</p>';
            return;
        }

        let htmlContent = '';
        
        // جلب أول 6 مقالات كحد أقصى
        const maxResults = Math.min(entries.length, 6);
        for (let i = 0; i < maxResults; i++) {
            const entry = entries[i];
            const title = entry.title.$t;
            
            // جلب رابط المقال
            let link = "";
            for (let j = 0; j < entry.link.length; j++) {
                if (entry.link[j].rel === 'alternate') {
                    link = entry.link[j].href;
                    break;
                }
            }
            
            // جلب نبذة وتصفيتها من أكواد HTML
            let summary = "";
            if (entry.summary && entry.summary.$t) {
                summary = entry.summary.$t;
            } else if (entry.content && entry.content.$t) {
                summary = entry.content.$t;
            }
            summary = summary.replace(/<[^>]*>/g, "").substring(0, 110) + "...";

            // بناء كود الـ HTML لكل كارت مقال
            htmlContent += `
                <article class="post-card">
                    <h3 class="post-title">${title}</h3>
                    <p class="post-excerpt">${summary}</p>
                    <a href="${link}" target="_blank" class="btn-link">اقرأ المقال بالكامل ←</a>
                </article>
            `;
        }
        
        container.innerHTML = htmlContent;
    }
</script>

<script src="https://malekahmed2.blogspot.com/feeds/posts/default?alt=json-in-script&callback=myBloggerFeed"></script>

<script>
    // نظام التوجيه الذكي للمقالات القديمة القادمة من محركات البحث
    (function() {
        var bloggerDomain = "https://malekahmed2.blogspot.com";
        var currentPath = window.location.pathname;
        var currentSearch = window.location.search;

        if (currentPath && currentPath !== "/" && currentPath !== "/index.html") {
            window.location.href = bloggerDomain + currentPath + currentSearch;
        }
    })();
</script>

</body>
</html>
