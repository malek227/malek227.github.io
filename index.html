<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطوير الأعمال والتقنية</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .post-card {
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .post-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #eaeff5;
        }
        .post-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .post-title {
            color: #222;
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .post-excerpt {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .btn-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            margin-top: auto;
            cursor: pointer;
        }
        
        /* تنسيقات صفحة قراءة المقال الكامل */
        .single-post-view {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .single-post-title {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .single-post-meta {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .single-post-body {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #444;
        }
        .single-post-body img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 15px 0;
        }
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .back-button:hover {
            background-color: #5a6268;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- واجهة القائمة الرئيسية للمقالات -->
    <div id="main-blog-view">
        <h1>مرحباً بك في المنصة المطورة لـ تطوير الأعمال والتقنية</h1>
        <div id="status-text">
            <p>تابع أحدث المقالات التقنية وإستراتيجيات تطوير المشاريع المزامنة تلقائياً بالصور من المدونة:</p>
        </div>
        <!-- حاوية عرض المنشورات -->
        <div id="posts-container" class="posts-grid"></div>
    </div>

    <!-- واجهة قراءة المقال المفرد (مخفية افتراضياً) -->
    <div id="single-post-view" class="single-post-view">
        <span class="back-button" onclick="showMainView()">→ العودة للمقالات</span>
        <h1 id="article-title" class="single-post-title"></h1>
        <div id="article-meta" class="single-post-meta"></div>
        <div id="article-body" class="single-post-body"></div>
    </div>
</div>

<script>
    // مصفوفة عالمية لحفظ المقالات بعد جلبها لسهولة استدعائها
    let blogEntries = [];

    // وظيفة استقبال ومعالجة البيانات القادمة من بلوجر
    function myBloggerFeed(data) {
        const container = document.getElementById('posts-container');
        
        if (!data || !data.feed || !data.feed.entry) {
            container.innerHTML = '<p>لا توجد منشورات متاحة حالياً.</p>';
            return;
        }

        blogEntries = data.feed.entry;
        let htmlContent = '';
        
        for (let i = 0; i < blogEntries.length; i++) {
            const entry = blogEntries[i];
            const title = entry.title.$t;
            
            // استخراج رابط الصورة
            let imageUrl = "";
            if (entry.media$thumbnail) {
                imageUrl = entry.media$thumbnail.url.replace('/s72-c/', '/w640-h360-c/');
            } else if (entry.content && entry.content.$t) {
                const match = entry.content.$t.match(/<img[^>]+src="([^">]+)"/);
                if (match) imageUrl = match[1];
            }
            
            if (!imageUrl) {
                imageUrl = "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&auto=format&fit=crop&q=60";
            }
            
            // استخراج مقتطف نصي
            let summary = "";
            if (entry.summary && entry.summary.$t) {
                summary = entry.summary.$t;
            } else if (entry.content && entry.content.$t) {
                summary = entry.content.$t;
            }
            summary = summary.replace(/<[^>]*>/g, "").substring(0, 100) + "...";

            // بناء كارت المقال وجعل زر القراءة يستدعي دالة برمجية داخل الموقع بدلاً من الانتقال الخارجي
            htmlContent += `
                <article class="post-card">
                    <img src="${imageUrl}" alt="${title}" class="post-image" loading="lazy">
                    <div class="post-content">
                        <h3 class="post-title">${title}</h3>
                        <p class="post-excerpt">${summary}</p>
                        <span onclick="readFullPost(${i})" class="btn-link">اقرأ المقال بالكامل ←</span>
                    </div>
                </article>
            `;
        }
        
        container.innerHTML = htmlContent;
    }

    // وظيفة فتح وقراءة المقال بالكامل داخل نفس الصفحة
    function readFullPost(index) {
        const entry = blogEntries[index];
        if (!entry) return;

        // إخفاء الواجهة الرئيسية وإظهار واجهة المقال
        document.getElementById('main-blog-view').style.display = 'none';
        document.getElementById('single-post-view').style.display = 'block';

        // تعبئة بيانات المقال
        document.getElementById('article-title').innerText = entry.title.$t;
        
        // جلب تاريخ النشر وتنسيقه
        const publishedDate = new Date(entry.published.$t).toLocaleDateString('ar-YE', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('article-meta').innerText = "تم النشر في: " + publishedDate;
        
        // جلب المحتوى الكامل للمقال (بما فيه من نصوص وتنسيقات وصور أصيلة)
        let fullBody = "";
        if (entry.content && entry.content.$t) {
            fullBody = entry.content.$t;
        } else if (entry.summary && entry.summary.$t) {
            fullBody = entry.summary.$t;
        }
        document.getElementById('article-body').innerHTML = fullBody;
        
        // الصعود لأعلى الصفحة تلقائياً عند فتح المقال
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // وظيفة العودة للرئيسية وقائمة المقالات
    function showMainView() {
        document.getElementById('single-post-view').style.display = 'none';
        document.getElementById('main-blog-view').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

<!-- استدعاء سكريبت الخلاصة من بلوجر لجلب البيانات كامة -->
<script src="https://malekahmed2.blogspot.com/feeds/posts/default?alt=json-in-script&callback=myBloggerFeed&max-results=50"></script>

</body>
</html>
