<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطوير الأعمال والتقنية</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .post-card {
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .post-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #eaeff5;
        }
        .post-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .post-title {
            color: #222;
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .post-excerpt {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .btn-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            margin-top: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مرحباً بك في المنصة المطورة لـ تطوير الأعمال والتقنية</h1>
    <div id="status-text">
        <p>تابع أحدث المقالات التقنية وإستراتيجيات تطوير المشاريع المزامنة تلقائياً بالصور من المدونة:</p>
    </div>
    
    <div id="posts-container" class="posts-grid"></div>
</div>

<script>
    // 1. وظيفة استقبال ومعالجة بيانات مدونة بلوجر
    function myBloggerFeed(data) {
        const container = document.getElementById('posts-container');
        
        if (!data || !data.feed || !data.feed.entry) {
            container.innerHTML = '<p>لا توجد منشورات متاحة حالياً.</p>';
            return;
        }

        const entries = data.feed.entry;
        let htmlContent = '';
        
        // جلب أول 6 مقالات
        const maxResults = Math.min(entries.length, 6);
        for (let i = 0; i < maxResults; i++) {
            const entry = entries[i];
            const title = entry.title.$t;
            
            // جلب رابط المقال
            let link = "";
            for (let j = 0; j < entry.link.length; j++) {
                if (entry.link[j].rel === 'alternate') {
                    link = entry.link[j].href;
                    break;
                }
            }
            
            // استخراج رابط الصورة من المقال بدقة
            let imageUrl = "";
            if (entry.media$thumbnail) {
                // جلب الصورة المصغرة واستبدال الحجم الافتراضي الصغير جداً بحجم أكبر وأوضح لتبدو احترافية
                imageUrl = entry.media$thumbnail.url.replace('/s72-c/', '/w640-h360-c/');
            } else if (entry.content && entry.content.$t) {
                // فحص محتوى المقال بحثاً عن أي وسم صورة في حال عدم وجود مصغرة
                const match = entry.content.$t.match(/<img[^>]+src="([^">]+)"/);
                if (match) imageUrl = match[1];
            }
            
            // إذا لم يتم العثور على أي صورة، نضع صورة غلاف تقنية افتراضية ممتازة
            if (!imageUrl) {
                imageUrl = "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&auto=format&fit=crop&q=60";
            }
            
            // جلب نص المقال وتصفيته
            let summary = "";
            if (entry.summary && entry.summary.$t) {
                summary = entry.summary.$t;
            } else if (entry.content && entry.content.$t) {
                summary = entry.content.$t;
            }
            summary = summary.replace(/<[^>]*>/g, "").substring(0, 100) + "...";

            // بناء تصميم الكارت المطور شاملاً الصورة
            htmlContent += `
                <article class="post-card">
                    <img src="${imageUrl}" alt="${title}" class="post-image" loading="lazy">
                    <div class="post-content">
                        <h3 class="post-title">${title}</h3>
                        <p class="post-excerpt">${summary}</p>
                        <a href="${link}" target="_blank" class="btn-link">اقرأ المقال بالكامل ←</a>
                    </div>
                </article>
            `;
        }
        
        container.innerHTML = htmlContent;
    }

    // 2. نظام التوجيه الذكي للمقالات القديمة
    (function() {
        var bloggerDomain = "https://malekahmed2.blogspot.com";
        var currentPath = window.location.pathname;
        var currentSearch = window.location.search;

        if (currentPath && currentPath !== "/" && currentPath !== "/index.html") {
            window.location.href = bloggerDomain + currentPath + currentSearch;
        }
    })();
</script>

<script src="https://malekahmed2.blogspot.com/feeds/posts/default?alt=json-in-script&callback=myBloggerFeed"></script>

</body>
</html>
