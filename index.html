<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطوير الأعمال والتقنية</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .post-card {
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .post-card:hover {
            transform: translateY(-5px);
        }
        .post-title {
            color: #222;
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .post-excerpt {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .btn-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            margin-top: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مرحباً بك في المنصة المطورة لـ تطوير الأعمال والتقنية</h1>
    <div id="status-text">
        <p>جاري استيراد أحدث المقالات والمواضيع الحصرية مباشرة من المدونة...</p>
    </div>
    
    <div id="loader" class="loader"></div>
    <div id="posts-container" class="posts-grid" style="display: none;"></div>
</div>

<script>
    (function() {
        var bloggerDomain = "https://malekahmed2.blogspot.com";
        var currentPath = window.location.pathname;
        var currentSearch = window.location.search;

        // 1. التوجيه الذكي: إذا كان الزائر يطلب رابط مقال قديم قادم من محرك البحث، يتم توجيهه لبلوجر فوراً لضمان عدم خسارة الزيارة
        if (currentPath && currentPath !== "/" && currentPath !== "/index.html") {
            window.location.href = bloggerDomain + currentPath + currentSearch;
            return;
        }

        // 2. إذا كان الزائر في الصفحة الرئيسية، نقوم بجلب خلاصة المقالات ديناميكياً من بلوجر وعرضها هنا
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('posts-container');
            const loader = document.getElementById('loader');
            const statusText = document.getElementById('status-text');

            // رابط جلب الخلاصة من بلوجر بصيغة JSON متوافقة
            const feedUrl = `${bloggerDomain}/feeds/posts/default?alt=json&max-results=6`;

            fetch(feedUrl)
                .then(response => {
                    if (!response.ok) throw new Error("تعذر الاتصال بخلاصة بلوجر");
                    return response.json();
                })
                .then(data => {
                    loader.style.display = 'none';
                    container.style.display = 'grid';
                    statusText.innerHTML = '<p>تابع أحدث الاستراتيجيات والمقالات التقنية المزامنة تلقائياً:</p>';

                    const entries = data.feed.entry;
                    if (!entries || entries.length === 0) {
                        container.innerHTML = '<p>لا توجد منشورات متوفرة في المدونة حالياً.</p>';
                        return;
                    }

                    entries.forEach(entry => {
                        // جلب عنوان المقال
                        const title = entry.title.$t;
                        
                        // جلب رابط المقال الأصلي على بلوجر
                        let link = "";
                        for (let i = 0; i < entry.link.length; i++) {
                            if (entry.link[i].rel === 'alternate') {
                                link = entry.link[i].href;
                                break;
                            }
                        }

                        // جلب مقتطف أو نبذة قصيرة من نص المقال وتنظيفه من أكواد HTML
                        let summary = "";
                        if (entry.summary && entry.summary.$t) {
                            summary = entry.summary.$t;
                        } else if (entry.content && entry.content.$t) {
                            summary = entry.content.$t;
                        }
                        // تنظيف النص ليظهر مقتطف نظيف بحد أقصى 120 حرف
                        summary = summary.replace(/<[^>]*>/g, "").substring(0, 120) + "...";

                        // إنشاء كارت المقال وضبطه
                        const postCard = document.createElement('article');
                        postCard.className = 'post-card';
                        postCard.innerHTML = `
                            <h3 class="post-title">${title}</h3>
                            <p class="post-excerpt">${summary}</p>
                            <a href="${link}" target="_blank" class="btn-link">اقرأ المقال بالكامل ←</a>
                        `;
                        container.appendChild(postCard);
                    });
                })
                .catch(error => {
                    console.error("خطأ أثناء جلب المقالات:", error);
                    loader.style.display = 'none';
                    statusText.innerHTML = '<p style="color: red;">تعذر جلب المقالات تلقائياً، يمكنك الانتقال للمدونة مباشرة.</p>';
                    container.style.display = 'block';
                    container.innerHTML = `<a href="${bloggerDomain}" class="btn-link" style="font-size: 18px;">اضغط هنا للانتقال إلى مدونة بلوجر الرئيسية</a>`;
                });
        });
    })();
</script>

</body>
</html>
