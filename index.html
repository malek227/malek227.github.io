<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطوير الأعمال والتقنية</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .post-card {
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }
        .post-card:hover {
            transform: translateY(-5px);
        }
        .post-title {
            color: #222;
            font-size: 1.2rem;
            margin: 0 0 10px 0;
        }
        .post-excerpt {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .btn-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مرحباً بك في المنصة المطورة لـ تطوير الأعمال والتقنية</h1>
    <div id="status-text">
        <p>جاري تحضير الاتصال الآمن واستيراد البيانات التقنية وحلول تطوير الأعمال...</p>
    </div>
    
    <div id="loader" class="loader"></div>
    <div id="posts-container" class="posts-grid" style="display: none;"></div>
</div>

<script>
    (function() {
        var bloggerDomain = "https://malekahmed2.blogspot.com";
        var currentPath = window.location.pathname;
        var currentSearch = window.location.search;

        // 1. إذا كان الزائر يطلب مقالاً قديماً محدداً (وليس الصفحة الرئيسية)، يتم توجيهه فوراً لبلوجر دون خسارة الزيارة
        if (currentPath && currentPath !== "/" && currentPath !== "/index.html") {
            window.location.href = bloggerDomain + currentPath + currentSearch;
            return;
        }

        // 2. إذا كان الزائر في الصفحة الرئيسية، يتم إلغاء التوجيه الفوري، وقراءة المنشورات ديناميكياً من ملف JSON الخاص بك
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('posts-container');
            const loader = document.getElementById('loader');
            const statusText = document.getElementById('status-text');

            fetch('posts.json')
                .then(response => {
                    if (!response.ok) throw new Error("تعذر جلب ملف JSON");
                    return response.json();
                })
                .then(posts => {
                    loader.style.display = 'none';
                    container.style.display = 'grid';
                    statusText.innerHTML = '<p>تابع أحدث المقالات والإستراتيجيات الحصرية:</p>';

                    if(posts.length === 0) {
                        container.innerHTML = '<p>لا توجد منشورات متوفرة حالياً.</p>';
                        return;
                    }

                    posts.forEach(post => {
                        const postCard = document.createElement('article');
                        postCard.className = 'post-card';
                        postCard.innerHTML = `
                            <h3 class="post-title">${post.title}</h3>
                            <p class="post-excerpt">${post.excerpt}</p>
                            <a href="${post.link}" class="btn-link">اقرأ المزيد ←</a>
                        `;
                        container.appendChild(postCard);
                    });
                })
                .catch(error => {
                    console.error(error);
                    // في حال فشل جلب الـ JSON، نترك فرصة ثانية للتوجيه الافتراضي كخيار احتياطي بعد ثانيتين لضمان عمل الموقع
                    setTimeout(function() {
                        window.location.href = bloggerDomain + currentSearch;
                    }, 2000);
                });
        });
    })();
</script>

</body>
</html>
